<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Relais Casa Moresca · Check-in</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init("I9MHhau0Zw3ZcX7mj");</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   DESIGN SYSTEM — bnbcasamoresca.com
   Bianco calce · Verde oliva · Oro senape
   Font: Raleway
══════════════════════════════════════════ */
:root {
  /* Colours from the site */
  --white:     #FFFFFF;
  --calce:     #F8F5F0;       /* white-lime background */
  --calce-2:   #F0EBE3;       /* slightly darker sand */
  --border:    #DDD5C8;
  --olive:     #5C7A52;       /* mediterranean green */
  --olive-lt:  #E8F0E5;
  --gold:      #B8943F;       /* warm gold accent */
  --gold-lt:   #F5EDD8;
  --ink:       #1C1C1C;       /* near-black text */
  --muted:     #7A7060;
  --arch:      #3D3228;       /* dark arch brown */
  --arch-mid:  #6B5744;
  --red-lt:    #FDECEA;
  --red:       #B03030;
  --blue:      #3A5FA0;
  --blue-lt:   #E8EEF8;
  --shadow:    0 2px 16px rgba(28,28,28,.08);
  --shadow-lg: 0 8px 40px rgba(28,28,28,.13);
  --r:         12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Raleway',sans-serif;background:var(--calce);color:var(--ink);font-size:15px;font-weight:400}

/* ── TYPOGRAPHY ── */
.serif{font-family:'Raleway',sans-serif}
h1,h2,h3,.ttl{font-family:'Raleway',sans-serif;font-weight:400}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s}
.screen.active{opacity:1;pointer-events:all;transform:translateX(0)!important}
.screen.slide-r{transform:translateX(100%)}

/* ══════════════════════════════════════
   HOME
══════════════════════════════════════ */
#screen-home{background:var(--calce)}

.home-hdr{
  background:white;
  padding:18px 20px 0;
  position:relative;flex-shrink:0;
  text-align:center;
  border-bottom:1px solid var(--border);
}
.home-hdr::after{
  content:'';position:absolute;
  bottom:-1px;left:0;right:0;height:1px;
  background:var(--border);
}
.hdr-banner{
  width:100%;max-width:340px;
  height:auto;display:block;margin:0 auto;
}
.hdr-sub-strip{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0 12px;
  border-top:1px solid var(--border);
  margin-top:12px;
}
.hdr-checkin-label{
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);font-weight:700;
}
.season-pill{
  display:inline-flex;align-items:center;gap:5px;
  border:1px solid rgba(92,122,82,.35);
  color:var(--olive);border-radius:20px;
  padding:4px 12px;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;font-weight:700;
}

.home-body{flex:1;overflow-y:auto;padding:10px 16px 100px;-webkit-overflow-scrolling:touch}

/* today banner */
.today-banner{
  background:var(--olive);
  border-radius:var(--r);padding:14px 16px;
  margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 18px rgba(92,122,82,.3);
}
.today-banner strong{display:block;color:white;font-size:16px;font-family:'Raleway',sans-serif;font-weight:400;letter-spacing:.02em}
.today-banner span{color:rgba(255,255,255,.7);font-size:12px;letter-spacing:.04em}
.today-ct{background:white;color:var(--olive);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;letter-spacing:.05em}

/* month label */
.mo-lbl{
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);font-weight:700;
  margin:20px 0 9px 2px;
  display:flex;align-items:center;gap:8px;
}
.mo-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* booking card */
.bk{
  background:var(--white);border-radius:var(--r);
  border:1px solid var(--border);
  margin-bottom:9px;overflow:hidden;
  box-shadow:var(--shadow);cursor:pointer;
  transition:transform .12s,box-shadow .12s;
}
.bk:active{transform:scale(.985);box-shadow:none}
.bk.today-card{border-color:var(--olive);border-width:1.5px}
.bk.done-card{opacity:.5}

.bk-row{display:flex;align-items:center;gap:12px;padding:13px 13px 11px}
.bk-cal{
  width:44px;height:44px;border-radius:8px;
  background:var(--calce);border:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;
}
.bk-cal .dy{font-size:19px;font-weight:700;line-height:1;color:var(--arch)}
.bk-cal .mo{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700}
.bk-cal.td{background:var(--olive);border-color:var(--olive)}
.bk-cal.td .dy,.bk-cal.td .mo{color:white}
.bk-inf{flex:1;min-width:0}
.bk-name{font-family:'Raleway',sans-serif;font-size:17px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.01em}
.bk-sub{font-size:12px;color:var(--muted);margin-top:1px;letter-spacing:.02em}
.bk-ic{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ic-p{background:var(--calce);color:var(--muted)}
.ic-d{background:var(--olive-lt);color:var(--olive)}
.ic-t{background:rgba(92,122,82,.12);color:var(--olive)}

.bk-foot{
  display:flex;align-items:center;
  border-top:1px solid var(--calce-2);
  padding:7px 13px;gap:8px;
}
.pill{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.pill-p{background:var(--calce-2);color:var(--muted)}
.pill-d{background:var(--olive-lt);color:var(--olive)}
.pill-t{background:rgba(92,122,82,.12);color:var(--olive)}
.bk-n{margin-left:auto;font-size:11px;color:var(--muted)}
.bk-more{background:none;border:none;color:var(--muted);font-size:19px;padding:2px 5px;cursor:pointer;line-height:1}

/* FAB */
.fab{
  position:fixed;bottom:24px;right:18px;
  width:54px;height:54px;border-radius:50%;
  background:var(--olive);color:white;
  border:none;cursor:pointer;font-size:26px;
  box-shadow:0 6px 20px rgba(92,122,82,.4);
  display:flex;align-items:center;justify-content:center;
  transition:transform .12s;z-index:10;
}
.fab:active{transform:scale(.91)}

/* empty */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.6}
.empty p{font-size:14px;line-height:1.7}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(28,28,28,.45);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--white);width:100%;border-radius:18px 18px 0 0;padding:0 0 env(safe-area-inset-bottom,16px);transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto}
.overlay.open .sheet{transform:translateY(0)}
.handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0}
.mo-ttl{font-family:'Raleway',sans-serif;font-size:21px;font-weight:400;padding:14px 20px 2px;color:var(--arch);letter-spacing:.02em}
.mo-body{padding:12px 20px 20px}

/* ══════════════════════════════════════
   FORM
══════════════════════════════════════ */
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input,.field select{
  width:100%;padding:13px 14px;
  border:1px solid var(--border);border-radius:9px;
  font-family:'Raleway',sans-serif;font-size:15px;color:var(--ink);
  background:var(--calce);outline:none;
  transition:border-color .18s,box-shadow .18s;
  -webkit-appearance:none;appearance:none;
}
.field input:focus,.field select:focus{border-color:var(--olive);box-shadow:0 0 0 3px rgba(92,122,82,.12);background:white}
.field-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ══════════════════════════════════════
   BUTTONS
══════════════════════════════════════ */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:none;border-radius:10px;font-family:'Raleway',sans-serif;font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-olive{background:var(--olive);color:white;box-shadow:0 4px 14px rgba(92,122,82,.3)}
.btn-olive:active{background:#4a6643}
.btn-gold{background:var(--gold);color:white;box-shadow:0 4px 14px rgba(184,148,63,.3)}
.btn-ghost{background:var(--calce-2);color:var(--muted);border:1px solid var(--border)}
.btn-danger{background:var(--red-lt);color:var(--red);border:none}
.btn-sm{padding:10px 16px;font-size:12px;width:auto;border-radius:8px}
.btn-grp{display:flex;flex-direction:column;gap:9px}

/* ══════════════════════════════════════
   CHECKIN SCREEN
══════════════════════════════════════ */
#screen-ci{background:var(--calce)}

.ci-hdr{
  background:#2D4A1E;
  padding:16px 16px 50px;
  position:relative;flex-shrink:0;
}
.ci-hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:28px;background:var(--calce);border-radius:28px 28px 0 0}
.ci-back{
  background:rgba(248,245,240,.1);border:1px solid rgba(248,245,240,.2);
  color:rgba(248,245,240,.8);border-radius:7px;
  padding:7px 12px;font-family:'Raleway',sans-serif;font-size:12px;
  letter-spacing:.08em;text-transform:uppercase;font-weight:700;
  cursor:pointer;margin-bottom:12px;
  display:inline-flex;align-items:center;gap:6px;
}
.ci-name{font-family:'Raleway',sans-serif;color:white;font-size:22px;font-weight:400;letter-spacing:.03em}
.ci-meta{color:rgba(248,245,240,.55);font-size:12px;margin-top:3px;letter-spacing:.04em}

/* progress */
.step-bar{display:flex;gap:5px;padding:0 16px;margin-top:-14px;position:relative;z-index:2;margin-bottom:12px;flex-shrink:0}
.sp{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s}
.sp.on{background:var(--olive)}
.sp.dn{background:var(--gold)}

.ci-body{flex:1;overflow-y:auto;padding:0 16px 100px;-webkit-overflow-scrolling:touch}

/* section card */
.sec{
  background:var(--white);border-radius:var(--r);
  border:1px solid var(--border);
  padding:18px 16px;margin-bottom:11px;
  box-shadow:var(--shadow);
}
.sec-ttl{
  font-family:'Raleway',sans-serif;
  font-size:18px;color:var(--arch);font-weight:500;
  margin-bottom:14px;padding-bottom:11px;
  border-bottom:1px solid var(--calce-2);
  display:flex;align-items:center;justify-content:space-between;
  letter-spacing:.02em;
}
.sec-eyebrow{
  font-family:'Raleway',sans-serif;
  font-size:9px;font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:var(--muted);
  display:block;margin-bottom:3px;
}

/* scan buttons */
.scan-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.sbtn{
  display:flex;align-items:center;gap:13px;padding:13px;
  border-radius:10px;background:var(--calce);
  border:1px solid var(--border);
  cursor:pointer;text-align:left;width:100%;
  transition:border-color .15s,background .15s;
}
.sbtn:active{transform:scale(.98)}
.sbtn.nfc{border-color:var(--blue);background:var(--blue-lt)}
.sbtn.ocr{border-color:var(--olive);background:var(--olive-lt)}
.sbtn.off{opacity:.35}
.sico{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.nfc .sico{background:#D4E0F5}
.ocr .sico{background:#C8DEBD}
.sbtn.manual .sico{background:var(--calce-2)}
.sbtn strong{display:block;font-size:14px;font-weight:700;color:var(--ink);letter-spacing:.01em}
.sbtn small{font-size:12px;color:var(--muted)}

/* NFC anim */
.nfc-anim{display:none;flex-direction:column;align-items:center;padding:22px 16px;text-align:center}
.nfc-anim.on{display:flex}
.nfc-rings{position:relative;width:76px;height:76px;margin-bottom:14px}
.nr{position:absolute;border-radius:50%;border:2px solid var(--blue);animation:np 1.8s ease-out infinite}
.nr:nth-child(1){inset:0;animation-delay:0s}
.nr:nth-child(2){inset:-12px;opacity:.5;animation-delay:.4s}
.nr:nth-child(3){inset:-24px;opacity:.22;animation-delay:.8s}
.ni{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px}
@keyframes np{0%{box-shadow:0 0 0 0 rgba(58,95,160,.5)}70%{box-shadow:0 0 0 16px rgba(58,95,160,0)}100%{box-shadow:0 0 0 0 rgba(58,95,160,0)}}
.nfc-anim strong{font-family:'Raleway',sans-serif;font-size:17px;color:var(--ink);margin-bottom:5px}
.nfc-anim p{font-size:13px;color:var(--muted);line-height:1.5}

/* OCR */
.ocr-wrap{display:none;flex-direction:column;align-items:center;gap:10px}
.ocr-wrap.on{display:flex}
#ocr-video{width:100%;max-width:340px;max-height:200px;object-fit:cover;border-radius:10px;border:2px solid var(--olive);background:#000}
.ocr-capture-btn{background:var(--olive);color:white;border:none;border-radius:12px;padding:16px 28px;font-family:'Raleway',sans-serif;font-size:15px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 14px rgba(92,122,82,.35);display:flex;align-items:center;gap:10px;width:100%;max-width:340px;justify-content:center;}

/* ospite item */
.osp{display:flex;align-items:center;gap:11px;padding:11px 12px;background:var(--calce);border-radius:9px;border:1px solid var(--border);margin-bottom:8px}
.osp-n{width:26px;height:26px;border-radius:50%;background:var(--olive);color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.osp-i{flex:1;min-width:0}
.osp-i strong{display:block;font-family:'Raleway',sans-serif;font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.osp-i small{font-size:11px;color:var(--muted)}
.osp-del{width:28px;height:28px;border-radius:50%;background:#FBECEC;border:none;cursor:pointer;color:var(--red);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* firma */
#firma-cv{width:100%;height:150px;display:block;border:1.5px dashed var(--border);border-radius:9px;background:var(--calce);cursor:crosshair;touch-action:none}
#firma-cv.sig{border-style:solid;border-color:var(--olive)}

/* summary */
.sr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--calce-2);font-size:14px}
.sr:last-child{border-bottom:none}
.sr span{color:var(--muted);letter-spacing:.02em}
.sr strong{text-align:right}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.tg{background:var(--olive-lt);color:var(--olive)}
.tgo{background:var(--gold-lt);color:var(--gold)}

/* bottom bar */
.bbar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);padding:11px 16px env(safe-area-inset-bottom,11px);box-shadow:0 -4px 20px rgba(28,28,28,.07);z-index:50;display:flex;gap:9px}
.bbar .back-btn{width:48px;flex-shrink:0;background:var(--calce-2);border:1px solid var(--border);color:var(--muted);border-radius:10px;font-size:19px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* SUCCESS */
#screen-ok{background:var(--calce);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.ok-arch{
  width:90px;height:90px;
  background:var(--olive-lt);
  border-radius:45px 45px 0 0;
  display:flex;align-items:center;justify-content:center;
  font-size:38px;margin-bottom:22px;
  animation:pop .4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
#screen-ok h2{font-family:'Raleway',sans-serif;font-size:28px;color:var(--arch);margin-bottom:8px;font-weight:400;letter-spacing:.03em}
#screen-ok p{color:var(--muted);font-size:14px;line-height:1.75;margin-bottom:30px}

/* LOADER */
.loader{position:fixed;inset:0;background:rgba(248,245,240,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s}
.loader.on{opacity:1;pointer-events:all}
.spin{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--olive);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{font-size:13px;color:var(--muted);letter-spacing:.05em}

/* misc */
.sep{text-align:center;position:relative;margin:13px 0}
.sep::before{content:'';position:absolute;left:0;top:50%;width:100%;height:1px;background:var(--border)}
.sep span{position:relative;background:var(--white);padding:0 10px;font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.info{background:var(--blue-lt);border-left:3px solid var(--blue);border-radius:8px;padding:10px 12px;font-size:13px;color:#2C4070;margin-bottom:11px}
.warn{background:var(--gold-lt);border-left:3px solid var(--gold);border-radius:8px;padding:10px 12px;font-size:13px;color:#7A5A10;margin-bottom:11px}
.mt8{margin-top:8px}
</style>
</head>
<body>

<div class="loader" id="ldr"><div class="spin"></div><p id="ltxt">Elaborazione…</p></div>

<!-- ════════════ HOME ════════════ -->

<div class="overlay" id="modal" onclick="bgClose(event)">
  <div class="sheet">
    <div class="handle"></div>
    <div class="mo-ttl" id="mo-ttl">Nuova prenotazione</div>
    <div class="mo-body">
      <input type="hidden" id="eid">
      <div class="field"><label>Nome ospite / intestatario *</label><input type="text" id="mn" placeholder="es. Famiglia Bianchi"></div>
      <div class="field-2">
        <div class="field"><label>Arrivo *</label><input type="date" id="ma"></div>
        <div class="field"><label>Partenza *</label><input type="date" id="mp"></div>
      </div>
      <div class="field"><label>Numero ospiti *</label>
        <select id="mo"><option value="">— seleziona —</option>
          <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option>
        </select>
      </div>
      <div class="field"><label>Note (opzionale)</label><input type="text" id="mno" placeholder="es. Booking.com · camera Paulonia…"></div>
      <div class="btn-grp">
        <button class="btn btn-olive" onclick="saveBk()">Salva prenotazione</button>
        <button class="btn btn-ghost" onclick="closeModal()">Annulla</button>
      </div>
      <div id="del-row" class="mt8" style="display:none">
        <button class="btn btn-danger" onclick="delBk()">🗑 Elimina prenotazione</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── STORAGE ─────────────────────────────────────────
const BK='rcm_bk26',DN='rcm_dn26';
const lBK=()=>{try{return JSON.parse(localStorage.getItem(BK)||'[]')}catch{return[]}};
const sBK=a=>localStorage.setItem(BK,JSON.stringify(a));
const lDN=()=>{try{return JSON.parse(localStorage.getItem(DN)||'{}')}catch{return{}}};
const mDN=id=>{const d=lDN();d[id]=true;localStorage.setItem(DN,JSON.stringify(d))};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

// ─── HOME ────────────────────────────────────────────
function renderHome(){
  const bks=lBK(),dn=lDN(),td=todayStr(),body=document.getElementById('home-body');
  if(!bks.length){
    body.innerHTML=`<div class="empty"><div class="empty-icon">🏡</div><p>Nessuna prenotazione inserita.<br>Tocca <strong>＋</strong> per aggiungere la prima prenotazione della stagione.</p></div>`;
    return;
  }
  const sorted=[...bks].sort((a,b)=>a.arrivo.localeCompare(b.arrivo));
  const tdArr=sorted.filter(b=>b.arrivo===td);
  let h='';
  if(tdArr.length) h+=`<div class="today-banner"><div><strong>Arrivi di oggi</strong><span>${fmtLong(td)}</span></div><div class="today-ct">${tdArr.length} arriv${tdArr.length===1?'o':'i'}</div></div>`;
  const months={};
  sorted.forEach(b=>{const k=b.arrivo.slice(0,7);if(!months[k])months[k]=[];months[k].push(b)});
  Object.entries(months).forEach(([k,list])=>{
    h+=`<div class="mo-lbl">${fmtMonth(k)}</div>`;
    list.forEach(b=>{
      const isTd=b.arrivo===td,isDn=!!dn[b.id];
      const[,mm,dd]=b.arrivo.split('-');
      const mo=['','Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'][+mm];
      const n=nights(b.arrivo,b.partenza);
      h+=`<div class="bk${isTd?' today-card':''}${isDn?' done-card':''}" onclick="startCI('${b.id}')">
        <div class="bk-row">
          <div class="bk-cal${isTd?' td':''}"><div class="dy">${dd}</div><div class="mo">${mo}</div></div>
          <div class="bk-inf">
            <div class="bk-name">${b.nome}</div>
            <div class="bk-sub">→ ${fmtD(b.partenza)} · ${b.num} ospit${b.num===1?'e':'i'}${b.note?' · '+b.note:''}</div>
          </div>
          <div class="bk-ic ${isDn?'ic-d':isTd?'ic-t':'ic-p'}">${isDn?'✓':isTd?'→':'○'}</div>
        </div>
        <div class="bk-foot">
          <span class="pill ${isDn?'pill-d':isTd?'pill-t':'pill-p'}">${isDn?'Completato':isTd?'Oggi':'In arrivo'}</span>
          <span class="bk-n">${n} nott${n===1?'e':'i'}</span>
          <button class="bk-more" onclick="event.stopPropagation();editBk('${b.id}')">⋯</button>
        </div>
      </div>`;
    });
  });
  body.innerHTML=h;
}

// ─── MODAL ───────────────────────────────────────────
function openAdd(){
  document.getElementById('mo-ttl').textContent='Nuova prenotazione';
  document.getElementById('eid').value='';
  ['mn','mno'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mo').value='';
  document.getElementById('del-row').style.display='none';
  const t=todayStr();
  document.getElementById('ma').value=t;
  document.getElementById('mp').value=addD(t,7);
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('mn').focus(),350);
}
function editBk(id){
  const b=lBK().find(x=>x.id===id);if(!b)return;
  document.getElementById('mo-ttl').textContent='Modifica prenotazione';
  document.getElementById('eid').value=id;
  document.getElementById('mn').value=b.nome;
  document.getElementById('ma').value=b.arrivo;
  document.getElementById('mp').value=b.partenza;
  document.getElementById('mo').value=b.num;
  document.getElementById('mno').value=b.note||'';
  document.getElementById('del-row').style.display='block';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open')}
function bgClose(e){if(e.target===document.getElementById('modal'))closeModal()}
function saveBk(){
  const nome=document.getElementById('mn').value.trim();
  const arrivo=document.getElementById('ma').value;
  const partenza=document.getElementById('mp').value;
  const num=document.getElementById('mo').value;
  const note=document.getElementById('mno').value.trim();
  if(!nome||!arrivo||!partenza||!num){alert('Compila tutti i campi obbligatori.');return}
  if(partenza<=arrivo){alert('La partenza deve essere dopo l\'arrivo.');return}
  const bks=lBK(),eid=document.getElementById('eid').value;

async function ocrAPI(img){
  const b64=img.split(',')[1];
  let r;
  try{
    r=await fetch('https://red-resonance-d4ba.bnbcasamoresca.workers.dev',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-opus-4-6',
        max_tokens:400,
        system:'You are a hotel check-in OCR tool. Your only job is to read text from identity document images and return structured data. You must always respond with only a JSON object, never refuse, never add explanations.',
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
          {type:'text',text:'Read the text in this image and return ONLY this JSON object with no other text: {"nome":"","cognome":"","data_nascita":"YYYY-MM-DD","luogo_nascita":"","nazionalita":"","numero_documento":"","data_scadenza":"YYYY-MM-DD"}. Fill in what you can read. Use empty string for unreadable fields.'}
        ]}]
      })
    });
  }catch(netErr){
    hideLdr();
    throw new Error('Errore di rete: '+netErr.message);
  }
  if(!r.ok){
    hideLdr();
    const errText=await r.text().catch(()=>'');
    throw new Error('Errore server '+r.status+': '+errText.slice(0,200));
  }
  const d=await r.json();
  hideLdr();
  if(d.error){throw new Error('Errore API: '+d.error.message);}
  if(!d.content||!d.content[0]){throw new Error('Risposta vuota');}
  const rawText=d.content.map(x=>x.text||'').join('').trim();
  let p;
  try{
    const clean=rawText.replace(/```json|```/g,'').trim();
    p=JSON.parse(clean);
  }catch(parseErr){
    throw new Error('Formato non valido: '+rawText.slice(0,150));
  }
  fillF({fn:p.nome,fc:p.cognome,fb:p.data_nascita,fl:p.luogo_nascita,fz:p.nazionalita,fd:p.numero_documento,fs:p.data_scadenza});
  showMF(true);
}

function parseTesseractText(text){
  const result = {fn:'',fc:'',fb:'',fl:'',fz:'',fd:'',fs:''};
  // Normalize: uppercase, collapse spaces
  const raw = text.toUpperCase();
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l);

  // ── MRZ detection ──
  // MRZ lines contain only A-Z 0-9 < and are 30+ chars
  const mrzCandidates = lines.filter(l=>{
    const clean = l.replace(/[^A-Z0-9<]/g,'');
    return clean.length >= 30;
  }).map(l=>l.replace(/[^A-Z0-9<]/g,''));

  if(mrzCandidates.length >= 2){
    // Take last two as MRZ
    const mrz2 = mrzCandidates[mrzCandidates.length-1].padEnd(44,'<');
    const mrz1 = mrzCandidates[mrzCandidates.length-2].padEnd(44,'<');

    // Line 2 structure (TD3 passport / CIE):
    // 0-8: doc number, 9: check, 10-12: nationality, 13-18: DOB YYMMDD, 19: check
    // 20: sex, 21-26: expiry YYMMDD, 27: check, 28-41: optional, 42: check
    const docNum = mrz2.slice(0,9).replace(/</g,'').trim();
    const nat    = mrz2.slice(10,13).replace(/</g,'').trim();
    const dob    = mrz2.slice(13,19);
    const expiry = mrz2.slice(21,27);

    if(docNum.length>=5) result.fd = docNum;
    if(nat.length>=2 && nat!='ITA') result.fz = nat;
    else if(nat=='ITA') result.fz = 'Italiana';

    if(/^[0-9]{6}$/.test(dob)){
      const yy=parseInt(dob.slice(0,2));
      const yyyy = yy>30 ? '19'+dob.slice(0,2) : '20'+dob.slice(0,2);
      result.fb = yyyy+'-'+dob.slice(2,4)+'-'+dob.slice(4,6);
    }
    if(/^[0-9]{6}$/.test(expiry)){
      const yy=parseInt(expiry.slice(0,2));
      const yyyy = yy>30 ? '19'+expiry.slice(0,2) : '20'+expiry.slice(0,2);
      result.fs = yyyy+'-'+expiry.slice(2,4)+'-'+expiry.slice(4,6);
    }

    // Line 1 names: P<ITA<COGNOME<<NOME<<<<...
    // or ID card: IDITA<COGNOME<<NOME<<...
    const nameStart = mrz1.indexOf('<',5);
    if(nameStart>0){
      const namePart = mrz1.slice(nameStart+1,44).replace(/</g,' ').trim();
      // double-space separates surname from given names
      const parts = namePart.split(/  +/);
      if(parts[0]) result.fc = parts[0].trim();
      if(parts[1]) result.fn = parts[1].trim();
    }
  }

  // ── Fallback: scan lines for known Italian ID labels ──
  lines.forEach(line=>{
    // Cognome / Surname
    if(!result.fc && /COGNOME[:\s]+([A-Z]{2,})/.test(line)){
      result.fc = line.match(/COGNOME[:\s]+([A-Z\s]+)/)[1].trim();
    }
    // Nome / Name  
    if(!result.fn && /NOME[:\s]+([A-Z]{2,})/.test(line)){
      result.fn = line.match(/NOME[:\s]+([A-Z\s]+)/)[1].trim();
    }
    // Luogo di nascita
    if(!result.fl && /LUOGO[:\s]+([A-Z\s]+)/.test(line)){
      result.fl = line.match(/LUOGO[:\s]+([A-Z\s]+)/)[1].trim();
    }
    // Comune di nascita
    if(!result.fl && /COMUNE[:\s]+([A-Z\s]+)/.test(line)){
      result.fl = line.match(/COMUNE[:\s]+([A-Z\s]+)/)[1].trim();
    }
    // Nazionalita
    if(!result.fz && /NAZIONAL[:\s]+([A-Z\s]+)/.test(line)){
      result.fz = line.match(/NAZIONAL[:\s]+([A-Z\s]+)/)[1].trim();
    }
  });

  // ── Fallback dates: DD/MM/YYYY or DD-MM-YYYY ──
  const allDates = [...raw.matchAll(/(\d{2})[\/\.\-](\d{2})[\/\.\-](\d{4})/g)];
  if(!result.fb && allDates.length>0){
    const d=allDates[0]; result.fb=d[3]+'-'+d[2]+'-'+d[1];
  }
  if(!result.fs && allDates.length>1){
    const d=allDates[allDates.length-1]; result.fs=d[3]+'-'+d[2]+'-'+d[1];
  }

  // ── Fallback doc number ──
  if(!result.fd){
    const m = raw.match(/[A-Z]{2}[0-9]{7}|[A-Z][0-9]{8}|[0-9]{9}|[A-Z]{2}[0-9]{5}[A-Z]{2}/);
    if(m) result.fd = m[0];
  }

  return result;
}

function initSig(){
  const c=document.getElementById('firma-cv');if(!c)return;
  const ctx=c.getContext('2d');let dr=false,lx=0,ly=0;
  c.width=c.offsetWidth||320;c.height=150;
  const pos=e=>{const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;
    return e.touches?[(e.touches[0].clientX-r.left)*sx,(e.touches[0].clientY-r.top)*sy]:[(e.clientX-r.left)*sx,(e.clientY-r.top)*sy]};
  c.addEventListener('mousedown',e=>{dr=true;[lx,ly]=pos(e)});
  c.addEventListener('mousemove',e=>{if(!dr)return;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.strokeStyle='#1C1C1C';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();[lx,ly]=[x,y];c.classList.add('sig')});
  c.addEventListener('mouseup',()=>dr=false);
  c.addEventListener('touchstart',e=>{e.preventDefault();dr=true;[lx,ly]=pos(e)},{passive:false});
  c.addEventListener('touchmove',e=>{e.preventDefault();if(!dr)return;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.strokeStyle='#1C1C1C';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();[lx,ly]=[x,y];c.classList.add('sig')},{passive:false});
  c.addEventListener('touchend',()=>dr=false);
}
function clrSig(){const c=document.getElementById('firma-cv');if(c){c.getContext('2d').clearRect(0,0,c.width,c.height);c.classList.remove('sig')}}
function blankCv(c){return!c.getContext('2d').getImageData(0,0,c.width,c.height).data.some(v=>v!==0)}

// ── SEND ─────────────────────────────────────────────
async function send(){
  const email=document.getElementById('eml')?.value.trim();
  if(!email||!email.includes('@')){alert('Inserisci un indirizzo email valido.');return}
  showLdr('Invio dati in corso…');
  const b=ci.bk,n=nights(b.arrivo,b.partenza),txt=buildTxt(n);
  try{
    await emailjs.send('service_tsjwj0q','template_yp4iy4r',{
      to_email: email,
      subject: 'Check-in Casa Moresca — '+b.nome,
      nome_ospite: b.nome,
      arrivo: fmtD(b.arrivo),
      partenza: fmtD(b.partenza),
      notti: String(n),
      num_ospiti: String(b.num),
      note: b.note||'—',
      dati_ospiti: ci.ospiti.map((o,i)=>`[Ospite ${i+1}] ${o.nome} ${o.cognome} — nato il ${fmtD(o.nascita)} a ${o.luogo} — Naz: ${o.naz} — Doc: ${o.docnum} scad. ${fmtD(o.scad)}`).join('\n'),
      messaggio: txt,
    });
    navigator.clipboard?.writeText(txt).catch(()=>{});
    mDN(b.id);hideLdr();
    document.getElementById('ok-msg').innerHTML=`Dati di <strong>${b.nome}</strong> inviati a ${email}.<br>Pronti per l'inserimento in Octorate.`;
    showScr('screen-ok');renderHome();
  }catch(e){
    hideLdr();
    navigator.clipboard?.writeText(txt).catch(()=>{});
    alert('Errore invio email: '+(e.text||JSON.stringify(e))+'\n\nI dati sono stati copiati negli appunti.');
    mDN(b.id);
    document.getElementById('ok-msg').innerHTML=`Dati copiati negli appunti.<br>Incollali nella tua email.`;
    showScr('screen-ok');renderHome();
  }
}
